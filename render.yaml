# Render blueprint: WebSocket server + managed Key Value (Redis).
# Deploy by pushing this repo to GitHub, then in Render: New > Blueprint.
services:
  - type: web
    name: rtide-server
    runtime: node
    plan: free
    # --include=dev is required: Render sets NODE_ENV=production, which would
    # otherwise skip devDependencies (typescript) and break the build.
    buildCommand: npm install --include=dev && npm run build --workspace server
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Render provides PORT automatically; the server reads process.env.PORT.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: rtide-redis
          property: connectionString
      # RapidAPI key for Judge0 (the Run button). Set this in the Render
      # dashboard — sync:false keeps the secret out of the repo.
      - key: JUDGE0_KEY
        sync: false

  # Managed Key Value (Redis) for cross-instance Pub/Sub fan-out.
  - type: keyvalue
    name: rtide-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []   # empty = internal-only (Render service-to-service)
